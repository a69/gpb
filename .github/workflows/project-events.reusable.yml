name: project-events (reusable)

on:
  workflow_dispatch:
    inputs:
      item_id:
        description: "ProjectsV2 item node ID (PVTI_...)"
        required: true
      event:
        description: "Event type"
        required: true
        type: choice
        options: [created, edited, moved, deleted]
      sender:
        description: "GitHub username"
        required: true
  workflow_call:
    inputs:
      item-id:
        required: true
        type: string
      event:
        required: true
        type: string
      sender:
        required: true
        type: string
      chat-id:
        required: true
        type: string
      platform:
        required: false
        type: string
        default: "bale"
        description: "Messaging platform: bale, telegram, slack"
    secrets:
      github-token:
        required: true
      bale-token:
        required: false
      token:
        required: false
        description: "Bot token or webhook URL (for non-Bale platforms)"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: a69/gpb
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: send-notification
        env:
          ITEM_ID: ${{ inputs.item-id || github.event.inputs.item_id }}
          EVENT: ${{ inputs.event || github.event.inputs.event }}
          SENDER: ${{ inputs.sender || github.event.inputs.sender }}
          GH_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          BALE_TOKEN: ${{ secrets.bale-token || secrets.BALE_TOKEN }}
          CHAT_ID: ${{ inputs.chat-id || vars.CHAT_ID }}
          PLATFORM: ${{ inputs.platform || 'bale' }}
          TOKEN: ${{ secrets.token || secrets.TOKEN }}
        run: |
          go run ./cmd/gpb notify \
            --github-token="${GH_TOKEN}" \
            --item-id="${ITEM_ID}" \
            --event="${EVENT}" \
            --sender="${SENDER}" \
            --bale-token="${BALE_TOKEN}" \
            --chat-id="${CHAT_ID}" \
            --platform="${PLATFORM}" \
            --token="${TOKEN}"
