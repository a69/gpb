name: daily-report
on:
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: |
          URGENCY_DAYS="${{ vars.URGENCY_DAYS }}"
          go run ./cmd/gpb report \
            --github-token="${{ secrets.GITHUB_TOKEN }}" \
            --project-id="${{ vars.PROJECT_ID }}" \
            --bale-token="${{ secrets.BALE_TOKEN }}" \
            --chat-id="${{ vars.CHAT_ID }}" \
            --urgency-days="${URGENCY_DAYS:-2}"
