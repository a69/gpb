name: daily-report
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: |
          go run ./cmd/gpb report \
            --github-token="${{ secrets.GITHUB_TOKEN }}" \
            --project-id="${{ vars.PROJECT_ID }}" \
            --bale-token="${{ secrets.BALE_TOKEN }}" \
            --chat-id="${{ vars.CHAT_ID }}" \
            --urgency-days="${{ vars.URGENCY_DAYS }}"
