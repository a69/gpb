name: daily-report (reusable)

on:
  workflow_call:
    inputs:
      project-id:
        required: true
        type: string
      chat-id:
        required: true
        type: string
      urgency-days:
        required: false
        type: string
        default: "2"
      platform:
        required: false
        type: string
        default: "bale"
        description: "Messaging platform: bale, telegram, slack"
    secrets:
      github-token:
        required: true
      bale-token:
        required: false
      token:
        required: false
        description: "Bot token or webhook URL (for non-Bale platforms)"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: a69/gpb
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: |
          go run ./cmd/gpb report \
            --github-token="${{ secrets.github-token }}" \
            --project-id="${{ inputs.project-id }}" \
            --chat-id="${{ inputs.chat-id }}" \
            --urgency-days="${{ inputs.urgency-days }}" \
            --bale-token="${{ secrets.bale-token }}" \
            --platform="${{ inputs.platform }}" \
            --token="${{ secrets.token }}"
