# Copy this file to .github/workflows/daily-report.yaml in your repo.
#
# Required secrets:
#   GH_PAT       — GitHub PAT with read:project scope
#   BALE_TOKEN   — Bale bot token from BotFather
#
# Required variables:
#   PROJECT_ID   — GitHub ProjectsV2 node ID (PVT_...)
#   CHAT_ID      — Bale group chat ID
#   URGENCY_DAYS — (optional) days threshold for urgent flag, defaults to 2

name: daily-report

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: a69/gpb

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: |
          URGENCY_DAYS="${{ vars.URGENCY_DAYS }}"
          go run ./cmd/gpb report \
            --github-token="${{ secrets.GH_PAT }}" \
            --project-id="${{ vars.PROJECT_ID }}" \
            --bale-token="${{ secrets.BALE_TOKEN }}" \
            --chat-id="${{ vars.CHAT_ID }}" \
            --urgency-days="${URGENCY_DAYS:-2}"
